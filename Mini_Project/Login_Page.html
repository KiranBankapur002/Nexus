<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <link rel="stylesheet" href="Login_page.css">
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <button class="close-button">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="white" width="24px" height="24px">
                    <path d="M0 0h24v24H0z" fill="none"/>
                    <path d="M6 18L18 6M6 6l12 12" stroke="currentColor" stroke-width="2"/>
                </svg>
            </button>
            <div class="login-logo">
                <!-- Your resized SVG logo with white color -->
                <svg class="logo" xmlns="http://www.w3.org/2000/svg" version="1.0" width="100" height="100" viewBox="0 0 360.000000 360.000000" preserveAspectRatio="xMidYMid meet">
                    <metadata>
                    Created by potrace 1.10, written by Peter Selinger 2001-2011
                    </metadata>
                    <g class="logo-path" transform="translate(0.000000,360.000000) scale(0.100000,-0.100000)" fill="#ffffff" stroke="none">
                    <path d="M1330 2600 c80 -160 443 -798 610 -1070 129 -210 351 -560 356 -560 17 0 -438 800 -669 1175 -122 198 -305 486 -314 495 -3 3 5 -15 17 -40z"/>
                    <path d="M1540 2445 c97 -186 216 -396 350 -616 110 -179 289 -459 295 -459 2 0 -2 13 -7 28 -9 23 2 108 56 443 37 228 70 422 72 432 5 16 -6 17 -124 17 l-129 0 -37 -227 c-20 -126 -36 -238 -36 -250 0 -38 -13 -26 -59 55 -128 221 -416 682 -443 707 -6 6 22 -53 62 -130z"/>
                    <path d="M1426 2209 c-16 -87 -136 -825 -136 -831 0 -5 56 -8 124 -8 l124 0 6 28 c3 15 22 126 42 247 20 121 37 222 39 223 2 2 13 -15 25 -38 59 -116 439 -731 473 -765 12 -12 -78 158 -181 345 -101 181 -320 545 -425 704 -85 129 -85 129 -91 95z"/>
                    </g>
                </svg>
            </div>
            <h2>Sign in to NEXUS</h2>
            <button class="google-signin">
                <img id="Google_logo" src="Google_logo.png" alt="Google Logo" width="20" height="20">
                &nbsp;Sign in with Google</button>
            <button class="apple-signin">
                <svg height="18" viewBox="0 0 14 18" width="14" xmlns="http://www.w3.org/2000/svg">
                    <path d="M13.0729 7.6825a3.61 3.61 0 0 0-1.7248 3.0365 3.5132 3.5132 0 0 0 2.1379 3.2223 8.394 8.394 0 0 1-1.0948 2.2618c-.6816.9812-1.3943 1.9623-2.4787 1.9623s-1.3633-.63-2.613-.63c-1.2187 0-1.6525.6507-2.644.6507s-1.6834-.9089-2.4787-2.0243a9.7842 9.7842 0 0 1-1.6628-5.2776c0-3.0984 2.014-4.7405 3.9969-4.7405 1.0535 0 1.9314.6919 2.5924.6919.63 0 1.6112-.7333 2.8092-.7333a3.7579 3.7579 0 0 1 3.1604 1.5802zm-3.7284-2.8918a3.5615 3.5615 0 0 0 .8469-2.22 1.5353 1.5353 0 0 0-.031-.32 3.5686 3.5686 0 0 0-2.3445 1.2084 3.4629 3.4629 0 0 0-.8779 2.1585 1.419 1.419 0 0 0 .031.2892 1.19 1.19 0 0 0 .2169.0207 3.0935 3.0935 0 0 0 2.1586-1.1368z"></path>
                </svg>
                
                
                
                &nbsp;Sign in with Apple</button>
            <div class="separator">or</div>
            <input type="text" placeholder="Phone, email, or username">
            <button class="next-button">Next</button>
            <a href="#" class="forgot-password">Forgot password?</a>
            <div class="signup-text">
                Don't have an account? <a href="#">Sign up</a>
            </div>
        </div>
    </div>
</body>
</html>
